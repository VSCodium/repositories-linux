$schema: https://raw.githubusercontent.com/zokugun/artifact/v0.12.0/schemas/v4/install.json
artifacts:
  "@daiyam/artifact-lang-js":
    version: 0.14.7
    requires:
      - "22"
    provides:
      - "20"
    update:
      .github/workflows/ci*:
        if_exists: skip
        if_missing: skip
      .editorconfig:
        if_exists: skip
  "@daiyam/artifact-gh-issuehub":
    version: 0.6.5
variables:
  DISCUSSION_ID: 6
  ISSUE_ID: 5
